<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- custom CSS -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main>
        <!-- Login Section Start -->
        <div class="w-full max-w-[440px] mx-auto flex flex-col bg-white rounded-3xl drop-shadow-sm p-4 md:p-8 my-6 items-center">
            <div class="text-center mb-2">
                <img class="w-auto mx-auto mb-4" src="./assets/github-logo.png" alt="logo">
                <h1 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h1>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>

            <form class="w-full space-y-5">
                <div class="w-full">
                    <label class="label px-0 pt-0 pb-2">
                        <span class="label-text text-[14px] font-semibold text-slate-700">Username</span>
                    </label>
                    <input id="userName" type="text" placeholder="Enter Username"
                        class="input input-bordered w-full bg-white border-slate-200 focus:outline-none focus:border-[#424243] rounded-md placeholder:text-slate-400  shadow-sm" />
                    <label class="label px-0 pt-1 pb-0">
                        <span class="text-sm font-semibold text-[#4A00FF]">Default: admin</span>
                    </label>
                </div>
                <div class="w-full">
                    <label class="label px-0 pt-0 pb-2">
                        <span class="label-text text-[14px] font-semibold text-slate-700">Password</span>
                    </label>
                    <input id="password" type="password" placeholder="Enter Password"
                        class="input input-bordered w-full bg-white border-slate-200 focus:outline-none focus:border-[#424243] rounded-md placeholder:text-slate-400  shadow-sm" />
                    <label class="label px-0 pt-1 pb-0">
                        <span class="text-sm font-semibold text-[#4A00FF]">Default: admin123</span>
                    </label>
                </div>
                <button id="loginBtn" type="button" class="btn btn-primary w-full">
                    Sign In
                </button>
            </form>
            <!-- Login Section End -->

           <!-- Footer Section -->
            <div class="divider my-5 text-slate-400 font-bold text-sm">OR</div>
            <div class="w-full text-center">
                <p class="text-[#64748B] text-[14px] mb-5">Demo Credentials:</p>
                <div class="bg-[#F8FAFC] flex flex-col gap-1 rounded-2xl p-4 border border-slate-500">
                    <p class="text-slate-700 text-sm">
                        <span class="font-semibold">Username:</span> admin
                    </p>
                    <p class="text-slate-700 text-sm">
                        <span class="font-semibold">Password:</span> admin123
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script src="./login.js"></script>
</body>

</html>
