<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- custom CSS -->
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-gray-100">
    <!-- NAVBAR -->
    <div class="navbar bg-white shadow px-10">
        <div class="flex-1 flex items-center gap-2">
            <img src="./assets/github-logo.png" class="hidden md:block w-6">
            <h1 class="text-sm font-bold md:text-lg">
                GitHub Issues Tracker
            </h1>
        </div>
        <div class="flex gap-2">
            <input id="searchInput" class="input input-bordered" placeholder="🔍 Search issues...">
            <button onclick="searchIssue()" class="btn bg-[#4A00FF] text-white">
                + New Issues
            </button>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="max-w-7xl mx-auto mt-8">

        <!-- TAB SECTION START -->
        <div class="bg-white p-4 rounded-xl shadow mb-6">
            <div class="flex gap-3">
                <button id="allBtn" onclick="filterIssues('all','allBtn')"
                    class="px-6 py-2 border rounded bg-[#4A00FF] cursor-pointer text-white">
                    All
                </button>
                <button id="openBtn" onclick="filterIssues('open','openBtn')"
                    class="px-6 py-2 border rounded cursor-pointer">
                    Open
                </button>
                <button id="closedBtn" onclick="filterIssues('closed','closedBtn')"
                    class="px-6 py-2 border rounded cursor-pointer">
                    Closed
                </button>
            </div>
        </div>
        <!-- TAB SECTION END -->


        <!-- ISSUE SUMMARY START-->
        <div class="bg-white p-6 rounded-xl shadow flex justify-between mb-6">
            <div class="flex gap-4 items-center">
                <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center">
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 class="text-xl font-bold">
                        <span id="issueCount">0</span> Issues
                    </h2>
                    <p class="text-gray-500 text-sm">
                        Track and manage your project issues
                    </p>
                </div>
            </div>
            <div class="flex gap-4 text-sm">
                <p class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                    Open
                </p>
                <p class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                    Closed
                </p>
            </div>
        </div>
        <!-- ISSUE SUMMARY END-->


        <!-- SPINNER -->
        <div id="spinner" class="flex justify-center hidden">
            <span class="loading loading-spinner loading-lg"></span>
        </div>

        <!-- ISSUES Container -->
        <div id="issuesContainer" class="grid lg:grid-cols-4 md:grid-cols-2 grid-cols-1 gap-6">
        </div>
    </div>

    <!-- MODAL -->
    <dialog id="issueModal" class="modal">
        <div class="modal-box max-w-2xl">
            <div id="modalContent"></div>
        </div>
    </dialog>


    <!-- Script -->
    <script src="./issues.js"></script>
</body>
</html>
